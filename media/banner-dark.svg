<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-labelledby="title desc">
    <title id="title">DrawBox — a drawing SDK for Kotlin Multiplatform</title>
    <desc id="desc">DrawBox wordmark and a stylized canvas card showing a small flow chart with Idea, Build, and Ship nodes. Dark theme variant.</desc>

    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0D1117"/>
            <stop offset="100%" stop-color="#161B22"/>
        </linearGradient>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="1" fill="#FFFCF6" fill-opacity="0.08"/>
        </pattern>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9D1D9"/>
        </marker>
    </defs>

    <rect width="1600" height="400" fill="url(#bg)"/>

    <g transform="translate(80, 0)">
        <text x="0" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="124" font-weight="700" fill="#F0F6FC" letter-spacing="-2">DrawBox</text>
        <text x="6" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="500" fill="#8B949E">A drawing SDK for Kotlin Multiplatform</text>

        <g transform="translate(6, 285)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#C9D1D9">
            <g>
                <rect x="0" y="0" width="96" height="36" rx="18" fill="#21262D" stroke="#30363D" stroke-width="1"/>
                <text x="48" y="24" text-anchor="middle">Android</text>
            </g>
            <g transform="translate(108, 0)">
                <rect x="0" y="0" width="56" height="36" rx="18" fill="#21262D" stroke="#30363D"/>
                <text x="28" y="24" text-anchor="middle">iOS</text>
            </g>
            <g transform="translate(176, 0)">
                <rect x="0" y="0" width="96" height="36" rx="18" fill="#21262D" stroke="#30363D"/>
                <text x="48" y="24" text-anchor="middle">Desktop</text>
            </g>
            <g transform="translate(284, 0)">
                <rect x="0" y="0" width="124" height="36" rx="18" fill="#21262D" stroke="#30363D"/>
                <text x="62" y="24" text-anchor="middle">Web · WASM</text>
            </g>
            <g transform="translate(420, 0)">
                <rect x="0" y="0" width="76" height="36" rx="18" fill="#21262D" stroke="#30363D"/>
                <text x="38" y="24" text-anchor="middle">JS</text>
            </g>
        </g>
    </g>

    <g transform="translate(960, 50)">
        <rect x="0" y="0" width="560" height="300" rx="16" fill="#1C232C" stroke="#30363D" stroke-width="1" filter="url(#shadow)"/>
        <rect x="2" y="2" width="556" height="296" rx="14" fill="url(#dots)"/>

        <path d="M 380 50 Q 410 28 440 48 T 500 50 T 540 68" stroke="#C792EA" stroke-width="3" fill="none" stroke-linecap="round"/>

        <rect x="50" y="110" width="140" height="80" rx="14" fill="#0E3A33" stroke="#1ABC9C" stroke-width="3"/>
        <text x="120" y="158" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="600" fill="#A9F0DC">Idea</text>

        <line x1="200" y1="150" x2="255" y2="150" stroke="#C9D1D9" stroke-width="3" marker-end="url(#arrowhead)"/>

        <rect x="265" y="110" width="140" height="80" rx="14" fill="#3B1B17" stroke="#E74C3C" stroke-width="3" stroke-dasharray="8 6"/>
        <text x="335" y="158" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#F5A8A0">Build</text>

        <line x1="415" y1="150" x2="450" y2="150" stroke="#C9D1D9" stroke-width="3" marker-end="url(#arrowhead)"/>

        <circle cx="500" cy="150" r="42" fill="#2EC365"/>
        <text x="500" y="158" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF">Ship</text>

        <text x="280" y="255" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#8B949E">authored as JSON · rendered by DrawBox</text>
    </g>
</svg>